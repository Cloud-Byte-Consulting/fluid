name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - run: go vet ./...
      - run: go build ./...
      # TODO(CLO-209): switch to `ginkgo -race -p ./...` after the Ginkgo migration.
      - run: go test ./... -race -count=1
